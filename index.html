<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Tasks</title>
    <script type="module" src="./src/main.js" defer></script>
    <link rel="stylesheet" href="./src/reset.css">
    <link rel="stylesheet" href="./src/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  </head>
<div id="modal-overlay" class="hidden">
  <div id="modal"></div>
</div>
  <body>
    <div class="container">
      <div class="sidebar">
        <div class="top">
          <h1>Planner</h1>
        </div>

        <div class="bottom">
          <div class="global">
            <button id="alltasks"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clipboard-list-icon lucide-clipboard-list"><rect width="8" height="4" x="8" y="2" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>All Tasks</button>
            <button id="done"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-book-check-icon lucide-book-check"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H19a1 1 0 0 1 1 1v18a1 1 0 0 1-1 1H6.5a1 1 0 0 1 0-5H20"/><path d="m9 9.5 2 2 4-4"/></svg>Done</button>
            <button id="due"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-clock-icon lucide-clock"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Due</button>
          </div>

          <div class="projects">
            <div class="proj-title">
              <p>Your Projects</p>
            </div>
            <ul id="project-list">

            </ul>
            <button id="addProjectBtn">+ Add Project</button>
          </div>
        </div>
      </div>

      <div class="main">
        <div class="header">
          <h2 id="project-curr"></h2>
        </div>

        <div class="tasks">
    <div class="task-table-header">
      <span>Title</span>
      <span>Due Date</span>
      <span>Priority</span>
      <span>Status</span>
      <span></span>
    </div>

    <div class="task-list" id="task-list">
      
    </div>
        </div>

        <div class="adder">
          <button id="addTaskBtn">+</button>
        </div>

      </div>
    </div>
  </body>
</html>
